name: koralauncher
description: "Kora — A launcher that asks why. Behavioral screen-time control for Android."
publish_to: 'none'
version: 1.0.6+6

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # ── UI & FONTS ───────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.19.0

  # ── STORAGE ──────────────────────────────────────────────
  shared_preferences: ^2.5.4   # flags, minimal mode, fast UI reads
  drift: ^2.32.1                # SQLite ORM — behavioral database
  drift_flutter: ^0.3.0         # Flutter-specific Drift bindings
  path_provider: ^2.1.5         # locates SQLite file on device
  path: ^1.9.1                  # path joining for DB file location

  # ── ANDROID SYSTEM ───────────────────────────────────────
  installed_apps: ^2.1.1        # reads installed app list + icons
  android_intent_plus: ^6.0.0   # launches system intents (dialer, camera)
  app_usage: ^4.1.0             # reads raw Android UsageStats API
  device_info_plus: ^12.3.0     # device/SDK version checks
  url_launcher: ^6.3.2          # opens URLs from within the app
  upgrader: ^11.1.0             # Play Store update detection

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1            # generates kora_database.g.dart
  build_runner: ^2.13.1         # runs code generation
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21